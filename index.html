<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>לזכרו של ברק לב שלם</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --bg: #fdfcfb; --white: #ffffff; --text: #333; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; color: var(--text); line-height: 1.6; overflow-x: hidden; }
        
        /* Nav */
        nav { background: var(--primary); color: white; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; height: 65px; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: white; text-decoration: none; font-weight: 500; cursor: pointer; }
        
        /* Layout */
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        header { text-align: center; padding: 60px 20px; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1500&q=80'); background-size: cover; color: white; margin-bottom: 30px; }
        
        /* Components */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-top: 30px; }
        .card { background: var(--white); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: transform 0.3s; cursor: pointer; border: 1px solid #eee; }
        .card:hover { transform: translateY(-5px); }
        .card-img { width: 100%; height: 200px; object-fit: cover; background: #eee; }
        .card-content { padding: 15px; }
        .tag { display: inline-block; background: #eee; padding: 2px 10px; border-radius: 15px; font-size: 0.8em; margin-bottom: 10px; }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .modal-content { background: var(--white); max-width: 800px; margin: 40px auto; border-radius: 15px; position: relative; padding: 40px; }
        .close-btn { position: absolute; top: 20px; left: 20px; font-size: 30px; cursor: pointer; }
        
        /* Sections */
        .section-title { border-bottom: 2px solid var(--accent); display: inline-block; margin-bottom: 30px; padding-bottom: 5px; }
        .hero-widgets { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .widget-box { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; backdrop-filter: blur(5px); }

        /* Comments */
        .comment-section { margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }
        .comment-item { background: #f9f9f9; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        .comment-form input, .comment-form textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .submit-btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }

        @media (max-width: 768px) { .hero-widgets { grid-template-columns: 1fr; } .nav-links { display: none; } }
    </style>
</head>
<body>

    <nav>
        <div style="font-size: 1.4em; font-weight: bold;">לזכרו של ברק לב שלם</div>
        <div class="nav-links">
            <a onclick="showSection('home')">דף הבית</a>
            <a onclick="showSection('gallery')">גלריה</a>
            <a onclick="showSection('jokes')">בדיחות</a>
            <a onclick="showSection('texts')">סיפורים ויצירות</a>
            <a onclick="showSection('about')">אודות</a>
        </div>
    </nav>

    <div id="main-content"></div>

    <div id="item-modal" class="modal">
        <div class="modal-content" id="modal-inner"></div>
    </div>

    <script>
        // --- CONFIGURATION (קישורים מעודכנים) ---
        const JOKES_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSR74JGStqevOMg4uFKqudbSRFEQVRisiEgSwTuxnLjsTUx7TShIVuzPkdRgOZiJq8Pz3H-zoa_3mK3/pub?gid=0&single=true&output=csv";
        const PHOTOS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSevdjPZljQNazIav8vcVOszHVu5iKOA-AtYUjwhZGuZUibJpjgnJHC_tsrZY11p9aAE_iQytePZsAZ/pub?output=csv";
        const TEXTS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSXdGMnIRS-ydFn4BRfngLIAbdveYx7L7eS96kCvpruVDca1-uGk3qyQY9Nh9C_eTpbjKoojzB2zlFn/pub?gid=1983290067&single=true&output=csv";
        const COMMENTS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRLoH5kw3YDw4HGqSflNsJfe-Gaq34n-5916WzKs-wFlAiCOUiit6ZqmkUiKprnAyJ6ezB0bwQhkGej/pub?output=csv";
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwqak-Ai_5xyULt8tV0cjexgd-yp7K6ACOTAJXYhdGdaG3v_xqD-vcAS-dgnjBnRyVr/exec";

        let data = { jokes: [], photos: [], texts: [], comments: [] };
        let currentOpenItem = null;

        async function init() {
            await loadAllData();
            handleRouting();
            window.addEventListener('hashchange', handleRouting);
        }

        async function loadAllData() {
            const fetchCSV = (url) => new Promise(res => Papa.parse(url, { download: true, header: true, complete: results => res(results.data) }));
            
            const results = await Promise.allSettled([
                fetchCSV(JOKES_URL),
                fetchCSV(PHOTOS_URL),
                fetchCSV(TEXTS_URL),
                fetchCSV(COMMENTS_URL)
            ]);

            data.jokes = results[0].value || [];
            data.photos = results[1].value || [];
            data.texts = results[2].value || [];
            data.comments = results[3].value || [];
        }

        function handleRouting() {
            const hash = window.location.hash.substring(1);
            if (!hash || hash === 'home') renderHome();
            else if (hash === 'gallery') renderGallery();
            else if (hash === 'jokes') renderJokes();
            else if (hash === 'texts') renderTexts();
            else if (hash === 'about') renderAbout(document.getElementById('main-content'));
        }

        function renderHome() {
            const container = document.getElementById('main-content');
            const randomJoke = data.jokes.length ? data.jokes[Math.floor(Math.random() * data.jokes.length)] : null;
            const randomText = data.texts.length ? data.texts[Math.floor(Math.random() * data.texts.length)] : null;

            container.innerHTML = `
                <header>
                    <h1>ברק לב שלם</h1>
                    <p>19XX - 2024 | תמיד בלבנו</p>
                    <div class="hero-widgets container">
                        <div class="widget-box">
                            <strong>בדיחה אקראית:</strong>
                            <p>${randomJoke ? randomJoke['Joke Content'] : 'טוען...'}</p>
                        </div>
                        <div class="widget-box">
                            <strong>משהו שברק כתב:</strong>
                            <p>${randomText ? randomText['Title'] : 'טוען...'}</p>
                        </div>
                    </div>
                </header>
                <div class="container">
                    <h2 class="section-title">עדכונים אחרונים</h2>
                    <div class="grid" id="recent-grid"></div>
                </div>
            `;
            
            const recent = [...data.photos, ...data.texts].slice(0, 6);
            renderGrid(recent, document.getElementById('recent-grid'));
        }

        function renderGallery() {
            const container = document.getElementById('main-content');
            container.innerHTML = `<div class="container">
                <h2 class="section-title">גלריית תמונות וסרטונים</h2>
                <div class="grid" id="gallery-grid"></div>
            </div>`;
            renderGrid(data.photos, document.getElementById('gallery-grid'), 'photo');
        }

        function renderJokes() {
            const container = document.getElementById('main-content');
            container.innerHTML = `<div class="container">
                <h2 class="section-title">הבדיחות של ברק</h2>
                <div class="grid" id="jokes-grid"></div>
            </div>`;
            const jokesAsItems = data.jokes.map((j, i) => ({ ...j, Title: "בדיחה", id: 'j'+i, type: 'joke' }));
            renderGrid(jokesAsItems, document.getElementById('jokes-grid'), 'joke');
        }

        function renderTexts() {
            const container = document.getElementById('main-content');
            container.innerHTML = `<div class="container">
                <h2 class="section-title">סיפורים, מכתבים ויצירות</h2>
                <div class="grid" id="texts-grid"></div>
            </div>`;
            renderGrid(data.texts, document.getElementById('texts-grid'), 'text');
        }

        function renderGrid(items, container, typeFilter) {
            container.innerHTML = items.map((item, idx) => {
                const id = item.id || idx;
                const type = typeFilter || (item['Joke Content'] ? 'joke' : item['Link'] ? 'text' : 'photo');
                const img = item['Drive ID'] ? `https://lh3.googleusercontent.com/u/0/d/${item['Drive ID']}` : 'https://via.placeholder.com/300x200?text=Barak';
                
                return `
                    <div class="card" onclick="openItem('${type}', '${id}')">
                        ${type === 'photo' ? `<img src="${img}" class="card-img">` : ''}
                        <div class="card-content">
                            <span class="tag">${item.Categories || item.Type || 'כללי'}</span>
                            <h3>${item.Title || item['Joke Content']?.substring(0,30) + '...'}</h3>
                            <p>${item.Author || ''}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openItem(type, id) {
            let item;
            if (type === 'joke') item = data.jokes[id.replace('j','')];
            else if (type === 'photo') item = data.photos[id];
            else item = data.texts[id];

            currentOpenItem = { type, id, ...item };
            const modal = document.getElementById('item-modal');
            const inner = document.getElementById('modal-inner');
            
            let content = '';
            if (type === 'joke') {
                content = `<h2>בדיחה</h2><p style="font-size:1.2em">${item['Joke Content']}</p>`;
            } else if (type === 'photo') {
                const img = `https://lh3.googleusercontent.com/u/0/d/${item['Drive ID']}`;
                content = `<img src="${img}" style="width:100%; border-radius:10px;"><h2>${item.Title || ''}</h2>`;
            } else {
                content = `<h2>${item.Title}</h2><div style="white-space:pre-wrap">${item['Summary'] || 'טוען...'}</div>`;
                if (item.Link) content += `<br><a href="${item.Link}" target="_blank">קרא את המסמך המלא</a>`;
            }

            const itemComments = data.comments.filter(c => c.item_id === id && (c.Approved === 'YES' || c.approved === 'YES'));
            
            inner.innerHTML = `
                <span class="close-btn" onclick="closeModal()">&times;</span>
                ${content}
                <hr>
                <div class="comment-section">
                    <h3>תגובות וזכרונות</h3>
                    <div id="comments-list">${itemComments.map(c => `<div class="comment-item"><strong>${c.Name}:</strong> ${c.Content}</div>`).join('')}</div>
                    <div class="comment-form">
                        <h4>הוסיפו תגובה:</h4>
                        <input type="text" id="c-name" placeholder="שם מלא">
                        <input type="text" id="c-rel" placeholder="קשר לברק">
                        <textarea id="c-content" placeholder="כתבו מילה חמה..."></textarea>
                        <button class="submit-btn" onclick="submitComment('${id}')">שלח תגובה</button>
                    </div>
                </div>`;
            
            modal.style.display = 'block';
        }

        async function submitComment(itemId) {
            const payload = {
                name: document.getElementById('c-name').value,
                relation: document.getElementById('c-rel').value,
                content: document.getElementById('c-content').value,
                item_id: itemId
            };
            try {
                await fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                alert("תודה! התגובה נשלחה ותופיע לאחר אישור.");
                closeModal();
            } catch(e) { alert("שגיאה בשליחה"); }
        }

        function closeModal() { document.getElementById('item-modal').style.display = 'none'; }
        
        function renderAbout(container) {
            container.innerHTML = `<div class="container" style="max-width:700px">
                <h2 class="section-title">אודות האתר</h2>
                <p>אתר זה הוקם לזכרו של ברק לב שלם, במטרה לרכז את פועלו, יצירותיו והחיוך שהשאיר בעולם.</p>
                <p>כאן תוכלו למצוא את הבדיחות שאהב, השירים שכתב ותמונות מתחנות חייו השונות.</p>
            </div>`;
        }

        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>לזכרו של ברק - אתר הנצחה</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* עיצובים נוספים לסרטונים ומבנה הגלריה */
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 10px;
            background: #000;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.6);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            pointer-events: none;
        }
        .grid { display: flex; flex-wrap: wrap; gap: 20px; padding: 20px; justify-content: center; }
        .card { width: 280px; border: 1px solid #ddd; border-radius: 12px; cursor: pointer; overflow: hidden; background: #fff; transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .card img { width: 100%; height: 200px; object-fit: cover; display: block; }
        .card-content { padding: 15px; }
        .tag { background: #eef2f7; color: #334e68; padding: 3px 10px; border-radius: 15px; font-size: 12px; font-weight: bold; }
        
        /* מודל */
        .modal { display:none; position:fixed; z-index:2000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.85); justify-content:center; align-items:center; }
        .modal-content { background:#fff; padding:25px; border-radius:15px; width:95%; max-width:900px; max-height:90vh; overflow-y:auto; position:relative; }
        .close { position:absolute; left:20px; top:15px; font-size:35px; cursor:pointer; color: #333; }
    </style>
</head>
<body>

<header>
    <h1>לזכרו של ברק</h1>
    <nav>
        <button onclick="showPage('home')">דף הבית</button>
        <button onclick="showPage('gallery')">גלריה וסרטונים</button>
        <button onclick="showPage('texts')">יצירות וסיפורים</button>
    </nav>
</header>

<main id="main-content">
    <div style="text-align:center; padding:50px;">טוען את האתר...</div>
</main>

<div id="item-modal" class="modal" onclick="if(event.target == this) closeModal()">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <div id="modal-body"></div>
    </div>
</div>

<script>
    // --- קישורי הנתונים שלך ---
    const PHOTOS_URL = 'https://docs.google.com/spreadsheets/d/e/1rooy10tbz10B5r4fkeJVUgcJWYeYrC5PU5KYOry0YEo/pub?output=csv'; 
    const VIDEOS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSevdjPZljQNazIav8vcVOszHVu5iKOA-AtYUjwhZGuZUibJpjgnJHC_tsrZY11p9aAE_iQytePZsAZ/pub?gid=2135730881&single=true&output=csv';
    const TEXTS_URL  = 'https://docs.google.com/spreadsheets/d/e/YOUR_TEXTS_CSV_LINK/pub?output=csv';
    const JOKES_URL  = 'https://docs.google.com/spreadsheets/d/e/YOUR_JOKES_CSV_LINK/pub?output=csv';

    let data = { jokes: [], photos: [], texts: [] };

    async function init() {
        try {
            const [j, p, v, t] = await Promise.all([
                fetchCSV(JOKES_URL),
                fetchCSV(PHOTOS_URL),
                fetchCSV(VIDEOS_URL),
                fetchCSV(TEXTS_URL)
            ]);

            data.jokes = j;
            data.texts = t;
            // איחוד תמונות וסרטונים לרשימה אחת בגלריה
            data.photos = [...p, ...v];

            showPage('home');
        } catch (e) {
            console.error("Initialization error:", e);
            document.getElementById('main-content').innerHTML = "שגיאה בטעינת הנתונים.";
        }
    }

    function fetchCSV(url) {
        return fetch(url).then(res => res.text()).then(text => {
            const lines = text.split('\n').filter(l => l.trim() !== "");
            if (lines.length === 0) return [];
            const headers = lines[0].split(',').map(h => h.trim());
            return lines.slice(1).map(line => {
                const values = line.split(',');
                return headers.reduce((obj, nextKey, index) => {
                    obj[nextKey] = values[index] ? values[index].trim() : "";
                    return obj;
                }, {});
            });
        });
    }

    function showPage(page) {
        const main = document.getElementById('main-content');
        window.scrollTo(0,0);
        if (page === 'home') renderHome(main);
        else if (page === 'gallery') renderGallery(main);
        else if (page === 'texts') renderTexts(main);
    }

    function renderHome(container) {
        container.innerHTML = `
            <section class="hero">
                <h2>זוכרים את ברק</h2>
                <p>כאן תוכלו למצוא תמונות, סרטונים, יצירות וסיפורים של ברק.</p>
            </section>
        `;
    }

    function renderGallery(container) {
        container.innerHTML = `<h2>גלריה וסרטונים</h2><div class="grid" id="gallery-grid"></div>`;
        const grid = document.getElementById('gallery-grid');
        
        data.photos.forEach(p => {
            const isVideo = p.type === 'video';
            const cleanTitle = (p.title || "").replace(/'/g, "\\'");
            const thumbUrl = isVideo 
                ? `https://img.youtube.com/vi/${p.id}/hqdefault.jpg` 
                : `https://drive.google.com/uc?export=view&id=${p.id}`;
            
            grid.innerHTML += `
                <div class="card" onclick="openItem('${p.type}', '${p.id}', '${cleanTitle}')">
                    <div style="position:relative;">
                        <img src="${thumbUrl}" loading="lazy">
                        ${isVideo ? `<div class="play-icon">▶</div>` : ''}
                    </div>
                    <div class="card-content">
                        <span class="tag">${p.category || 'כללי'}</span>
                        <p>${p.title}</p>
                    </div>
                </div>`;
        });
    }

    function renderTexts(container) {
        container.innerHTML = `<h2>יצירות וסיפורים</h2><div class="grid" id="texts-grid"></div>`;
        const grid = document.getElementById('texts-grid');
        
        data.texts.forEach(t => {
            const cleanTitle = (t.title || "").replace(/'/g, "\\'");
            const cleanAuthor = (t.author || "").replace(/'/g, "\\'");
            grid.innerHTML += `
                <div class="card" onclick="openItem('text', '${t.id}', '${cleanTitle}', '${cleanAuthor}', '${t.content_link}')">
                    <div class="card-content">
                        <h3>${t.title}</h3>
                        <p>מאת: ${t.author}</p>
                        <span class="tag">${t.category}</span>
                    </div>
                </div>`;
        });
    }

    async function openItem(type, id, title, author = "", contentLink = "") {
        const modal = document.getElementById('item-modal');
        const body = document.getElementById('modal-body');
        modal.style.display = 'flex';
        body.innerHTML = 'טוען...';

        if (type === 'video') {
            body.innerHTML = `
                <h2 style="margin-bottom:15px;">${title}</h2>
                <div class="video-container">
                    <iframe src="https://www.youtube.com/embed/${id}?autoplay=1" frameborder="0" allowfullscreen></iframe>
                </div>`;
        } else if (type === 'text') {
            try {
                const res = await fetch(contentLink);
                const html = await res.text();
                
                // בדיקה אם יש סרטון שקשור ליצירה (במידה והוספת עמודת video_id בגיליון הטקסטים)
                const textItem = data.texts.find(i => i.id === id);
                let videoHeader = "";
                if (textItem && textItem.video_id) {
                    videoHeader = `<div class="video-container" style="margin-bottom:20px;">
                        <iframe src="https://www.youtube.com/embed/${textItem.video_id}" frameborder="0" allowfullscreen></iframe>
                    </div>`;
                }

                body.innerHTML = `<h2>${title}</h2><p><strong>מאת: ${author}</strong></p><hr>${videoHeader}<div>${html}</div>`;
            } catch (e) { body.innerHTML = "לא ניתן לטעון את התוכן."; }
        } else {
            // תמונה רגילה
            body.innerHTML = `<h2>${title}</h2><img src="https://drive.google.com/uc?export=view&id=${id}" style="width:100%; border-radius:10px;">`;
        }
    }

    function closeModal() {
        document.getElementById('item-modal').style.display = 'none';
        document.getElementById('modal-body').innerHTML = ''; // מפסיק סרטון שמתנגן
    }

    init();
</script>
</body>
</html>

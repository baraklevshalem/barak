<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>לזכרו של ברק לב שלם</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --bg: #fdfcfb; --white: #ffffff; --text: #333; }
        html { overflow-y: scroll; scroll-behavior: smooth; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; color: var(--text); direction: rtl; }
        
        /* Navigation & Hamburger */
        nav { background: var(--primary); color: white; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; height: 65px; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: white; text-decoration: none; font-weight: 500; cursor: pointer; transition: 0.2s; }
        .nav-links a:hover { color: var(--accent); }
        .hamburger { display: none; font-size: 28px; cursor: pointer; background: none; border: none; color: white; }

        @media (max-width: 768px) {
            .nav-links { display: none; flex-direction: column; position: absolute; top: 65px; left: 0; width: 100%; background: var(--primary); padding: 20px; gap: 15px; box-shadow: 0 5px 10px rgba(0,0,0,0.2); }
            .nav-links.active { display: flex; }
            .hamburger { display: block; }
        }

        /* Layout */
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--accent); margin: 40px 0 20px; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .show-all-btn { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 5px 15px; border-radius: 5px; cursor: pointer; font-size: 0.9rem; font-weight: bold; }

        /* Filters */
        .filter-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 25px; }
        .filter-btn { background: #eee; border: none; padding: 8px 18px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .filter-btn.active { background: var(--accent); color: white; }

        /* Cards */
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; display: flex; flex-direction: column; transition: 0.3s; height: 100%; border: 1px solid #eee; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 200px; object-fit: cover; background: #eee; }
        .card-content { padding: 15px; flex-grow: 1; text-align: right; }
        .tag { display: inline-block; background: #fff3e0; color: var(--accent); padding: 3px 10px; border-radius: 15px; font-size: 0.75rem; font-weight: bold; margin-bottom: 8px; margin-left: 5px; }

        /* Hero */
        .hero { display: flex; align-items: center; gap: 40px; padding: 40px 0; }
        .hero-img { flex: 0 0 300px; }
        .hero-img img { width: 100%; border-radius: 15px; box-shadow: 10px 10px 0 var(--accent); object-fit: cover; aspect-ratio: 1; }
        @media (max-width: 768px) { .hero { flex-direction: column; text-align: center; } .hero-img { flex: 0 0 auto; width: 220px; } }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; }
        .modal-content { background: white; width: 95%; max-width: 900px; max-height: 90vh; border-radius: 20px; overflow-y: auto; padding: 30px; position: relative; direction: rtl; text-align: right; }
        .external-content-wrapper { all: revert; direction: rtl !important; text-align: right !important; font-family: sans-serif; line-height: 1.6; }
        
        .modal-actions { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .share-btn { background: #f0f0f0; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 0.9rem; }

        /* Comment System */
        .comment-section { margin-top: 30px; background: #f9f9f9; padding: 20px; border-radius: 10px; border: 1px solid #eee; }
        .comment-bubble { background: white; padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #eee; }
        .comment-form input, .comment-form textarea { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ddd; box-sizing: border-box; font-family: inherit; }
        .submit-btn { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        .submit-btn:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<nav>
    <div class="logo" onclick="showPage('home')" style="cursor:pointer; font-weight:bold; font-size:1.2rem;">ברק לב שלם</div>
    <button class="hamburger" onclick="toggleMenu()">☰</button>
    <div class="nav-links" id="nav-links">
        <a onclick="showPage('home'); toggleMenu()">בית</a>
        <a onclick="showPage('gallery'); toggleMenu()">גלריה</a>
        <a onclick="showPage('texts'); toggleMenu()">יצירות</a>
        <a onclick="showPage('jokes'); toggleMenu()">בדיחות</a>
        <a onclick="showPage('about'); toggleMenu()">קורות חיים</a>
    </div>
</nav>

<div class="container" id="main-content"></div>

<div id="item-modal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span onclick="closeModal()" style="position:absolute; top:15px; left:15px; font-size:35px; cursor:pointer; color:#999;">×</span>
        <div class="modal-actions" id="modal-actions"></div>
        <div id="modal-body"></div>
        <div id="comment-area"></div>
    </div>
</div>

<script>
    // הגדרות URL
    const JOKES_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSR74JGStqevOMg4uFKqudbSRFEQVRisiEgSwTuxnLjsTUx7TShIVuzPkdRgOZiJq8Pz3H-zoa_3mK3/pub?gid=0&single=true&output=csv';
    const PHOTOS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSevdjPZljQNazIav8vcVOszHVu5iKOA-AtYUjwhZGuZUibJpjgnJHC_tsrZY11p9aAE_iQytePZsAZ/pub?output=csv';
    const TEXTS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSXdGMnIRS-ydFn4BRfngLIAbdveYx7L7eS96kCvpruVDca1-uGk3qyQY9Nh9C_eTpbjKoojzB2zlFn/pub?gid=1983290067&single=true&output=csv';
    const COMMENTS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRLoH5kw3YDw4HGqSflNsJfe-Gaq34n-5916WzKs-wFlAiCOUiit6ZqmkUiKprnAyJ6ezB0bwQhkGej/pub?output=csv';
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwqak-Ai_5xyULt8tV0cjexgd-yp7K6ACOTAJXYhdGdaG3v_xqD-vcAS-dgnjBnRyVr/exec';

    const MAIN_PHOTO_ID = '1S-KFrVUHzS9dJsN1ag8EwfNyiXwFHqC-';
    const CV_FILE = 'about_barak.html';

    let data = { jokes: [], photos: [], texts: [], comments: [] };

    // פונקציית תמונות חכמה - פתרון ה-403 ושיפור מהירות
    function getPhotoUrl(id) {
        return `https://drive.google.com/thumbnail?id=${id}&sz=w1200`;
    }

    function toggleMenu() {
        document.getElementById('nav-links').classList.toggle('active');
    }

    async function init() {
        const [j, p, t, c] = await Promise.all([
            fetchCSV(JOKES_URL, true), fetchCSV(PHOTOS_URL, true), fetchCSV(TEXTS_URL, true), fetchCSV(COMMENTS_URL, true)
        ]);
        data.jokes = j; data.photos = p; data.texts = t;
        data.comments = c.filter(r => r.Approve === "YES");
        
        const urlParams = new URLSearchParams(window.location.search);
        const itemId = urlParams.get('item');
        
        showPage('home');
        
        if (itemId) {
            const photo = data.photos.find(p => p.id === itemId);
            if (photo) openItem('photo', photo.id, photo.id, photo.title);
            const text = data.texts.find(t => t.id === itemId);
            if (text) openItem('text', text.content_link, text.id, text.title);
        }
    }

    function fetchCSV(url, header) {
        return new Promise(res => Papa.parse(url, { download: true, header, skipEmptyLines: true, complete: r => res(r.data) }));
    }

    function showPage(pageId) {
        const container = document.getElementById('main-content');
        window.scrollTo(0,0);
        if (pageId === 'home') renderHome(container);
        else if (pageId === 'gallery') renderArchive(container, 'גלריה', data.photos, 'category', renderPhotoCard);
        else if (pageId === 'texts') renderArchive(container, 'יצירות וסיפורים', data.texts, 'type', renderTextCard);
        else if (pageId === 'jokes') renderArchive(container, 'מאגר הבדיחות', data.jokes, 'Categories', renderJokeCard);
        else if (pageId === 'about') renderAbout(container);
    }

    function renderHome(container) {
        const randomJoke = data.jokes[Math.floor(Math.random() * data.jokes.length)];
        const samplePhotos = [...data.photos].sort(() => 0.5 - Math.random()).slice(0, 4);
        const sampleTexts = [...data.texts].slice(0, 3);
        container.innerHTML = `
            <div class="hero">
                <div class="hero-img"><img src="${getPhotoUrl(MAIN_PHOTO_ID)}" alt="ברק"></div>
                <div class="hero-text"><h1>ברק לב שלם</h1><p>ברוכים הבאים לאתר הזיכרון של ברק. מקום שבו אספנו את המילים שלו, החיוך שלו והבדיחות שתמיד ידע לספר.</p></div>
            </div>
            <div class="section-header"><h3>בדיחה אקראית</h3><button class="show-all-btn" onclick="showPage('jokes')">לכל הבדיחות</button></div>
            <div style="background:white; padding:30px; border-radius:15px; border-right:5px solid var(--accent); margin-bottom:40px;">"${randomJoke ? randomJoke['Joke Content'] : ''}"</div>
            <div class="section-header"><h3>מהגלריה</h3><button class="show-all-btn" onclick="showPage('gallery')">הצג הכל</button></div>
            <div class="grid">${samplePhotos.map(renderPhotoCard).join('')}</div>
            <div class="section-header"><h3>יצירות נבחרות</h3><button class="show-all-btn" onclick="showPage('texts')">הצג הכל</button></div>
            <div class="grid">${sampleTexts.map(renderTextCard).join('')}</div>
        `;
    }

    function renderArchive(container, title, items, filterKey, cardFunc) {
        let cats = [];
        items.forEach(i => (i[filterKey] || 'כללי').split(',').forEach(c => cats.push(c.trim())));
        const uniqueCats = [...new Set(cats)];
        container.innerHTML = `
            <div class="section-header"><h2>${title}</h2></div>
            <div class="filter-bar">
                <button class="filter-btn active" onclick="filterItems(this, 'all')">הכל</button>
                ${uniqueCats.map(c => `<button class="filter-btn" onclick="filterItems(this, '${c}')">${c}</button>`).join('')}
            </div>
            <div class="grid">${items.map(cardFunc).join('')}</div>
        `;
    }

    function filterItems(btn, cat) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.card').forEach(card => {
            const itemCats = card.getAttribute('data-cats') || '';
            card.style.display = (cat === 'all' || itemCats.includes(cat)) ? 'flex' : 'none';
        });
    }

    function renderPhotoCard(p) {
        return `<div class="card" data-cats="${p.category}" onclick="openItem('photo', '${p.id}', '${p.id}', '${p.title}')">
            <img src="${getPhotoUrl(p.id)}" loading="lazy">
            <div class="card-content"><span class="tag">${p.category}</span><p>${p.title}</p></div>
        </div>`;
    }

    function renderTextCard(t) {
        return `<div class="card" data-cats="${t.type}" onclick="openItem('text', '${t.content_link}', '${t.id}', '${t.title}')">
            <div class="card-content"><span class="tag">${t.type}</span><h4>${t.title}</h4><p>${t.summary || ''}</p></div>
        </div>`;
    }

    function renderJokeCard(j) {
        return `<div class="card" data-cats="${j.Categories}"><div class="card-content"><span class="tag">${j.Categories}</span><p>"${j['Joke Content']}"</p></div></div>`;
    }

    async function openItem(type, path, id, title) {
        const modal = document.getElementById('item-modal');
        const body = document.getElementById('modal-body');
        modal.style.display = 'flex';
        body.innerHTML = 'טוען...';
        document.getElementById('modal-actions').innerHTML = `<button class="share-btn" onclick="shareItem('${id}', '${title}')">🔗 שתף פריט זה</button>`;

        if(type === 'photo') {
            body.innerHTML = `<img src="${getPhotoUrl(path)}" style="max-width:100%; border-radius:10px; display:block; margin:0 auto;">`;
        } else {
            try {
                const res = await fetch(path);
                const html = await res.text();
                body.innerHTML = `<div class="external-content-wrapper">${html}</div>`;
            } catch(e) { body.innerHTML = "הקובץ לא נמצא."; }
        }
        renderComments(id);
    }

    function shareItem(id, title) {
        const shareUrl = `${window.location.origin}${window.location.pathname}?item=${id}`;
        if (navigator.share) {
            navigator.share({ title: title, url: shareUrl });
        } else {
            const el = document.createElement('textarea');
            el.value = shareUrl; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
            alert("הקישור הועתק ללוח!");
        }
    }

    function renderComments(itemId) {
        const filtered = data.comments.filter(c => c.item_id === itemId);
        const listHtml = filtered.map(c => {
            const rel = c.relation ? ` (${c.relation})` : '';
            return `<div class="comment-bubble"><strong>${c.name}${rel}:</strong><p>${c.content}</p></div>`;
        }).join('');

        document.getElementById('comment-area').innerHTML = `
            <div class="comment-section">
                <h4>תגובות (${filtered.length})</h4>
                ${listHtml}
                <div class="comment-form">
                    <input type="text" id="c-name" placeholder="שם מלא (חובה)">
                    <input type="text" id="c-rel" placeholder="הקשר שלי לברק">
                    <textarea id="c-content" rows="3" placeholder="רציתי להגיד ש..."></textarea>
                    <button class="submit-btn" id="send-btn" onclick="sendComment('${itemId}')">שליחת התגובה</button>
                </div>
            </div>`;
    }

    async function sendComment(id) {
        const btn = document.getElementById('send-btn');
        const name = document.getElementById('c-name').value.trim();
        const relation = document.getElementById('c-rel').value.trim();
        const content = document.getElementById('c-content').value.trim();

        if(!name || !content) return alert("נא למלא שם ותוכן");
        
        btn.disabled = true; btn.innerText = "שולח...";
        const params = new URLSearchParams({ name, relation, content, item_id: id });

        try {
            await fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: params });
            alert("תודה! התגובה נשלחה ותופיע באתר לאחר אישור.");
            closeModal();
        } catch(e) { alert("שגיאה בשליחה"); btn.disabled = false; btn.innerText = "שליחת התגובה"; }
    }

    function closeModal() { 
        document.getElementById('item-modal').style.display = 'none';
        window.history.replaceState({}, '', window.location.pathname);
    }

    async function renderAbout(container) {
        container.innerHTML = `<div class="section-header"><h2>קורות חיים</h2></div><div id="cv-target">טוען...</div>`;
        try {
            const res = await fetch(CV_FILE);
            const html = await res.text();
            document.getElementById('cv-target').innerHTML = `<div class="external-content-wrapper">${html}</div>`;
        } catch(e) { document.getElementById('cv-target').innerHTML = "הקובץ לא נמצא."; }
    }

    window.onload = init;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>לזכרו של ברק לב שלם</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --bg: #fdfcfb; --white: #ffffff; --text: #333; }
        
        /* הגדרות בסיס ליישור לימין */
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            color: var(--text); 
            line-height: 1.6; 
            overflow-x: hidden; 
            direction: rtl; 
            text-align: right; 
        }
        
        /* Nav */
        nav { background: var(--primary); color: white; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; height: 65px; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: white; text-decoration: none; font-weight: 500; cursor: pointer; }
        
        /* Layout */
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--accent); margin: 40px 0 20px; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

        /* Hero */
        .hero { display: flex; align-items: center; gap: 40px; padding: 40px 0; }
        .hero-img { flex: 0 0 300px; }
        .hero-img img { width: 100%; border-radius: 15px; box-shadow: 10px 10px 0 var(--accent); object-fit: cover; aspect-ratio: 1; }
        .hero-text { flex: 1; }

        /* Cards */
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; display: flex; flex-direction: column; transition: 0.3s; height: 100%; border: 1px solid #eee; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-content { padding: 15px; flex-grow: 1; }
        .tag { display: inline-block; background: #fff3e0; color: var(--accent); padding: 3px 10px; border-radius: 15px; font-size: 0.75rem; font-weight: bold; margin-bottom: 8px; margin-left: 5px; }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; max-width: 800px; max-height: 90vh; border-radius: 20px; overflow-y: auto; padding: 40px; position: relative; direction: rtl; text-align: right; }
        
        /* CV & Content Display */
        .content-box { background: #fff; padding: 20px; border-radius: 10px; direction: rtl; text-align: right; }
        .cv-grid { display: flex; gap: 30px; align-items: flex-start; margin-top: 30px; }
        .cv-image { flex: 0 0 250px; }
        .cv-image img { width: 100%; border-radius: 10px; }
        .cv-text-area { flex: 1; min-height: 400px; }

        @media (max-width: 768px) {
            .hero { flex-direction: column; text-align: center; }
            .hero-img { flex: none; width: 200px; }
            .cv-grid { flex-direction: column; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo" onclick="showPage('home')" style="cursor:pointer">ברק לב שלם</div>
    <div class="nav-links">
        <a onclick="showPage('home')">בית</a>
        <a onclick="showPage('gallery')">גלריה</a>
        <a onclick="showPage('texts')">יצירות</a>
        <a onclick="showPage('jokes')">בדיחות</a>
        <a onclick="showPage('about')">קורות חיים</a>
    </div>
</nav>

<div class="container" id="main-content"></div>

<div id="item-modal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span onclick="closeModal()" style="position:absolute; top:15px; left:15px; font-size:30px; cursor:pointer">×</span>
        <div id="modal-body"></div>
    </div>
</div>

<script>
    const JOKES_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSR74JGStqevOMg4uFKqudbSRFEQVRisiEgSwTuxnLjsTUx7TShIVuzPkdRgOZiJq8Pz3H-zoa_3mK3/pub?gid=0&single=true&output=csv';
    const PHOTOS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSevdjPZljQNazIav8vcVOszHVu5iKOA-AtYUjwhZGuZUibJpjgnJHC_tsrZY11p9aAE_iQytePZsAZ/pub?output=csv';
    const TEXTS_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSXdGMnIRS-ydFn4BRfngLIAbdveYx7L7eS96kCvpruVDca1-uGk3qyQY9Nh9C_eTpbjKoojzB2zlFn/pub?gid=1983290067&single=true&output=csv';
    
    const MAIN_PHOTO_ID = '1S-KFrVUHzS9dJsN1ag8EwfNyiXwFHqC-';
    // שם הקובץ של קורות החיים שתשים ב-GitHub (באותה תיקייה של ה-index)
    const CV_FILE_NAME = 'about_barak.html'; 

    let data = { jokes: [], photos: [], texts: [] };

    function getPhotoUrl(id) { return `https://lh3.googleusercontent.com/d/${id}`; }

    async function init() {
        const [j, p, t] = await Promise.all([
            fetchCSV(JOKES_URL, true), fetchCSV(PHOTOS_URL, true), fetchCSV(TEXTS_URL, true)
        ]);
        data.jokes = j;
        data.photos = p.map(r => ({ title: r.title, id: r.id, category: r.category || 'כללי' }));
        data.texts = t.map(r => ({ ...r }));
        showPage('home');
    }

    function fetchCSV(url, header) {
        return new Promise(res => Papa.parse(url, { download: true, header, skipEmptyLines: true, complete: r => res(r.data) }));
    }

    function showPage(pageId) {
        const container = document.getElementById('main-content');
        window.scrollTo(0,0);
        if (pageId === 'home') renderHome(container);
        else if (pageId === 'gallery') renderArchive(container, 'גלריה', data.photos, 'category', renderPhotoCard);
        else if (pageId === 'texts') renderArchive(container, 'סיפורים ויצירות', data.texts, 'type', renderTextCard);
        else if (pageId === 'jokes') renderArchive(container, 'מאגר הבדיחות', data.jokes, 'Categories', renderJokeCard);
        else if (pageId === 'about') renderAbout(container);
    }

    function renderHome(container) {
        const randomJoke = data.jokes[Math.floor(Math.random() * data.jokes.length)];
        const samplePhotos = [...data.photos].sort(() => 0.5 - Math.random()).slice(0, 4);
        container.innerHTML = `
            <div class="hero">
                <div class="hero-img"><img src="${getPhotoUrl(MAIN_PHOTO_ID)}"></div>
                <div class="hero-text">
                    <h1>ברק לב שלם</h1>
                    <p>ברוכים הבאים לאתר הזיכרון של ברק. מקום שבו אספנו את המילים שלו, החיוך שלו והבדיחות שתמיד ידע לספר.</p>
                </div>
            </div>
            <div class="section-header"><h3>בדיחה אקראית</h3></div>
            <div style="background:white; padding:30px; border-radius:15px; border-right:5px solid var(--accent); margin-bottom:40px; font-size:1.4rem; font-style:italic;">
                "${randomJoke ? randomJoke['Joke Content'] : 'טוען...'}"
            </div>
            <div class="section-header"><h3>מהגלריה</h3></div>
            <div class="grid">${samplePhotos.map(renderPhotoCard).join('')}</div>
        `;
    }

    function renderArchive(container, title, items, filterKey, cardFunc) {
        container.innerHTML = `<h2>${title}</h2><div class="grid">${items.map(cardFunc).join('')}</div>`;
    }

    function renderPhotoCard(p) {
        return `<div class="card" onclick="openItem('photo', '${p.id}')">
            <img src="${getPhotoUrl(p.id)}">
            <div class="card-content"><span class="tag">${p.category}</span><p>${p.title}</p></div>
        </div>`;
    }

    function renderTextCard(t) {
        return `<div class="card" onclick="openItem('text', '${t.content_link}')">
            <div class="card-content">
                <span class="tag">${t.type}</span>
                <h4>${t.title}</h4>
                <p style="font-size:0.9rem; color:#666;">${t.summary || ''}</p>
            </div>
        </div>`;
    }

    function renderJokeCard(j) {
        return `<div class="card"><div class="card-content"><span class="tag">${j.Categories}</span><p>"${j['Joke Content']}"</p></div></div>`;
    }

    async function openItem(type, path) {
        const body = document.getElementById('modal-body');
        document.getElementById('item-modal').style.display = 'flex';
        body.innerHTML = 'טוען...';

        if(type === 'photo') {
            body.innerHTML = `<img src="${getPhotoUrl(path)}" style="max-width:100%; border-radius:10px;">`;
        } else if(type === 'text') {
            try {
                // שינוי: הוא פשוט טוען את מה שכתוב ב-content_link בלי להוסיף "texts/" פעמיים
                const response = await fetch(path);
                if (!response.ok) throw new Error();
                const html = await response.text();
                body.innerHTML = `<div class="content-box">${html}</div>`;
            } catch (e) {
                body.innerHTML = `<p>הקובץ ${path} לא נמצא בשרת. וודא שהנתיב בגיליון תואם למבנה התיקיות ב-GitHub.</p>`;
            }
        }
    }

    function closeModal() { document.getElementById('item-modal').style.display = 'none'; }

    async function renderAbout(container) {
        container.innerHTML = `
            <div class="container">
                <h2>קורות חיים</h2>
                <div class="cv-grid">
                    <div class="cv-image"><img src="${getPhotoUrl(MAIN_PHOTO_ID)}"></div>
                    <div id="cv-content-area" class="cv-text-area">טוען קורות חיים...</div>
                </div>
            </div>`;
        
        try {
            const response = await fetch(CV_FILE_NAME);
            const html = await response.text();
            document.getElementById('cv-content-area').innerHTML = `<div class="content-box">${html}</div>`;
        } catch (e) {
            document.getElementById('cv-content-area').innerHTML = "לא ניתן היה לטעון את קובץ קורות החיים.";
        }
    }

    window.onload = init;
</script>
</body>
</html>

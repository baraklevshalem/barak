<p dir="RTL">כל אדם שנושם&nbsp;<br>מעלה בי חיוך,<br>כל אישה שמזדקנת<br>מעניקה לי דעת,<br>כל ילד שרץ&nbsp;<br>משאיר בי טעם מתוק,<br>קול תינוק שצוחק&nbsp;<br>מחדש בי נשימה.</p>
<p dir="RTL">וברכה תשכון מעל כולם;<br>התינוק, שבפיו ברא מילה.<br>הילד, שאל חברו חייך.<br>הזקנה, שעטפה אותי בחום.<br>והאדם, שאת ליבו פתח<br>ואת חייו השלים.</p>
<p dir="RTL"><span style="font-size: 13px;">9/6/07</span></p>

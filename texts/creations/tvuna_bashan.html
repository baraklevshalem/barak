<p style="direction: rtl; ">עם התפקחות התבונה,</p>
<p style="direction: rtl; ">יוצא האדם במחולות עזים,</p>
<p style="direction: rtl; ">ויוצר התקרבות ממשית אל עצמו.</p>
<p style="direction: rtl; ">בו בזמן, הוא מקל על הלב,</p>
<p style="direction: rtl; ">באהדה קולנית וחשוכת יגון</p>
<p style="direction: rtl; ">(בשן אור, מתוך &quot;הגיגי חכמה ומזמורים&quot;)</p>
